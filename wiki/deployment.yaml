---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiki
  namespace: wiki
data:
  
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wiki
  namespace: wiki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wiki
  template:
    metadata:
      labels:
        app: wiki
    spec:
      securityContext:
        runAsUser: 3001
        runAsGroup: 3001
        fsGroup: 3001
      volumes:
        - name: wiki-vol
          persistentVolumeClaim:
            claimName: wiki
        - name: localtime
          hostPath:
            path: /etc/localtime
            type: File
      containers:
      - name: wiki
        image: leomoonstudios/wiki-go:1.8.7
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
        volumeMounts:
          - name: wiki-vol
            mountPath: /wiki/data
            subPath: assets
          - name: localtime
            mountPath: /etc/localtime
            readOnly: true
        ports:
          - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: wiki
  namespace: wiki
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
    name: http
  selector:
    app: wiki
---